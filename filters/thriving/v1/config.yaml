# Thriving Content Filter - Version 1.0
# Renamed from "uplifting" to match ovr.news Thriving lens (ADR-012)
# Dimension change: removed social_cohesion_impact (overlaps with Belonging's community_fabric)
# Lineage: uplifting v6 (deployed) -> uplifting v7 (prompt rewrite) -> thriving v1 (lens alignment)

filter:
  name: thriving
  version: "1.0"
  created: "2026-03-18"
  description: "Rate content for thriving value using orthogonal impact and assessment dimensions"
  focus: "DOCUMENTED OUTCOMES for human/planetary wellbeing, not emotional tone or speculation"
  lineage: "uplifting v7 prompt + ADR-012 rename + social_cohesion_impact removed for Belonging distinctiveness"

  changelog_v1: |
    Changes from uplifting v7:
    - Renamed from uplifting to thriving (ADR-012: lens-aligned naming)
    - Removed social_cohesion_impact dimension (overlaps with Belonging filter's community_fabric)
    - Redistributed weight: human_wellbeing_impact 0.30 -> 0.40, justice_rights_impact 0.15 -> 0.25
    - Impact/assessment split preserved: 65% / 35%
    - 5 dimensions (was 6)
    - Oracle scoring: 3-run averaging for continuous targets (ADR-010)

prefilter:
  enabled: true
  expected_pass_rate: 0.20
  description: "Blocks corporate finance, military buildups, and pure speculation without outcomes"

oracle:
  recommended: gemini-flash
  candidates:
    - gemini-flash
    - gemini-pro
    - claude-sonnet
  target_model: "Gemini Flash 2.0 / Claude Haiku"
  multi_run: 3  # Average 3 oracle runs for continuous targets

scoring:
  score_scale_factor: 1.2807  # 10.0 / 7.81 (calibrated max)

  dimensions:
    # === IMPACT DOMAINS (WHAT kind of thriving) === 65% total

    human_wellbeing_impact:
      weight: 0.40
      category: impact_domain
      description: "Improvement in health, safety, livelihoods, or basic needs"
      scale: |
        0-2: No wellbeing impact or harm documented
        3-4: Minor/indirect wellbeing benefit
        5-6: Moderate wellbeing improvement for identifiable group
        7-8: Significant wellbeing improvement with measurable outcomes
        9-10: Transformative wellbeing change (lives saved, poverty lifted, health restored)
      evidence_focus: "Health metrics, safety improvements, livelihood gains, basic needs met"

    justice_rights_impact:
      weight: 0.25
      category: impact_domain
      description: "Wrongs addressed, accountability achieved, rights expanded"
      scale: |
        0-2: No justice/rights dimension
        3-4: Problem documented but no action
        5-6: Initial accountability or rights advocacy
        7-8: Significant justice achieved (ruling, reparation, policy change)
        9-10: Landmark justice (systemic accountability, rights breakthrough)
      evidence_focus: "Court rulings, policy changes, accountability actions, rights expansions"
      critical_filters: |
        Score 0-2 if: Individual criminal sentencing without systemic impact
        (single convictions, arrests, sentences that don't set precedent or change policy)

    # === ASSESSMENT DIMENSIONS (HOW real/lasting) === 35% total

    evidence_level:
      weight: 0.10
      category: assessment
      description: "How verified are the THRIVING OUTCOMES specifically? (Not general journalism quality)"
      gatekeeper: true
      gatekeeper_threshold: 3
      gatekeeper_max_score: 3.0
      scale: |
        0-2: No thriving outcome to verify, OR pure speculation
        3-4: Thriving outcome claimed but limited evidence
        5-6: Thriving outcome documented with some data
        7-8: Thriving outcome well-documented with verifiable data
        9-10: Thriving outcome independently verified/replicated
      evidence_focus: "Data citations, source quality, verification level — specifically for the THRIVING outcome"

    benefit_distribution:
      weight: 0.10
      category: assessment
      description: "Who receives the thriving benefit? How accessible is it? (Not audience size)"
      scale: |
        0-2: No benefit to distribute, OR elite only (billionaires, executives, shareholders)
        3-4: Benefit reaches limited group (one community, one organization)
        5-6: Benefit reaches moderate population (regional, underserved demographic)
        7-8: Benefit broadly accessible (free/affordable, nationwide, low barriers)
        9-10: Benefit universally accessible (global commons, open source, structural inclusion)
      evidence_focus: "Who receives the benefit, access barriers, pricing, geographic reach of BENEFIT (not news)"

    change_durability:
      weight: 0.15
      category: assessment
      description: "How lasting is the positive change?"
      scale: |
        0-2: One-time event or temporary relief
        3-4: Short-term improvement (months)
        5-6: Sustained change (years) but reversible
        7-8: Durable structural change (institutions, infrastructure, rights)
        9-10: Permanent/self-sustaining transformation (systemic, generational)
      evidence_focus: "Timeframe mentioned, structural vs symptomatic, sustainability indicators"

  tiers:
    high:
      threshold: 7.0
      description: "Verified, broadly beneficial, lasting positive change"

    medium:
      threshold: 4.0
      description: "Documented benefits with moderate reach or durability"

    low:
      threshold: 0.0
      description: "Speculation, elite-only benefits, or no documented wellbeing impact"

  gatekeepers:
    evidence_gatekeeper:
      dimension: evidence_level
      threshold: 3
      max_score: 3.0
      reason: "Unverified thriving is not thriving"

  content_type_caps:
    corporate_finance:
      max_score: 2.0
      triggers:
        - "Stock prices, earnings, funding rounds, valuations, M&A, IPO"
      exceptions:
        - "worker cooperative"
        - "public benefit corporation"
        - "open source"
        - "community ownership"

    military_security:
      max_score: 4.0
      triggers:
        - "Military buildup, defense spending, weapons, armed forces deployment"
      exceptions:
        - "demilitarization"
        - "peace process"
        - "conflict resolution"
        - "disarmament"

    individual_crime:
      max_score: 3.0
      triggers:
        - "Single arrest, trial, conviction, sentencing of individual(s)"
      exceptions:
        - "systemic reform"
        - "class action"
        - "landmark/precedent-setting ruling"
        - "policy change"

    doom_framed:
      max_score: 4.0
      triggers:
        - "More than 50% of content describes harm/crisis/problem"
      exceptions:
        - "Investigative journalism documenting harm for accountability"

    pure_speculation:
      max_score: 3.0
      triggers:
        - "Article primarily uses 'could', 'might', 'may', 'promises to', 'aims to'"
      exceptions:
        - "documented pilot results"
        - "verified early outcomes"

preprocessing:
  head_tail:
    enabled: true
    head_tokens: 256
    tail_tokens: 256
    separator: " [...] "

training:
  target_samples: 5000
  train_val_test_split: [0.8, 0.1, 0.1]
  quality_threshold: 0.7
  recommended_model: "google/gemma-3-1b-pt"
  expected_mae: "<0.55"

hybrid_inference:
  stage1:
    embedding_model: "intfloat/multilingual-e5-small"
    probe_path: "probe/embedding_probe_e5small.pkl"
    threshold: null  # To be calibrated after training
  stage2:
    model: "current"

deployment:
  inference_time: "~20ms"
  inference_time_hybrid: "~12ms avg"
  cost_per_article: "$0.00"
  use_cases:
    - "Positive news aggregation"
    - "Solutions journalism curation"
    - "Progress tracking dashboards"
