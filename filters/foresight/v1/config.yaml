# Foresight Filter - Version 1.0
# Detects long-term decision-making: choices made for generations ahead
# Counters short-termism bias in news
# Evolved from signs_of_wisdom concept (2025-12-28)

filter:
  name: foresight
  version: "1.0"
  created: "2026-04-01"
  updated: "2026-04-01"
  description: "Rate content for evidence of genuine foresight - decisions made for generations ahead, not for the next quarter or election cycle"
  focus: "Decision-making quality: long-term thinking, systems awareness, course correction, intergenerational investment"

  core_insight: |
    News rewards the immediate - this week's crisis, this quarter's outrage. That's short-termism.
    This filter finds decisions made for generations ahead. It measures HOW decisions were made
    (process quality), not just what outcomes occurred. Education, knowledge transfer, and
    capacity building are core expressions of foresight.

prefilter:
  enabled: true
  type: embedding_screening  # ADR-011: e5-small similarity screening before oracle scoring
  expected_pass_rate: 0.05
  description: "Two-stage: e5-small embedding screener selects foresight candidates from corpus, oracle scores only screened articles"
  screening:
    model: "intfloat/multilingual-e5-small"
    seed_source: "datasets/foresight/screening/positives_from_calibration.jsonl"
    top_k: 2000
    notes: "Centroid computed from 9 seed articles (WA >= 2.5 from 300-article calibration batch)"

oracle:
  recommended: gemini-flash
  candidates:
    - gemini-flash
    - gemini-pro
    - claude-sonnet

scoring:
  score_scale_factor: 1.2529  # 10.0 / 7.98 (calibrated max, round 2 model)

  dimensions:
    # === DECISION QUALITY DIMENSIONS ===

    time_horizon:
      weight: 0.25
      category: decision_quality
      description: "Decisions where payoff is >10 years out; sacrificing short-term for long-term"
      scale: |
        0-2: No long-term framing. Short-term focus. Reactive decision-making.
        3-4: Some mention of future, but actions remain short-term. Vague "sustainability" language.
        5-6: Explicit multi-year framing (5-10 years). Some short-term sacrifice visible.
        7-8: Clear long-term commitment (10-30 years). Measurable short-term sacrifice for future benefit.
        9-10: Generational thinking (30+ years). Planning explicitly extends beyond current generation's lifespan.
      critical_filters: |
        Score 0-2 if: Article describes outcome but not the decision-making process,
        only short-term metrics mentioned (quarterly, annual),
        long-term language is rhetorical without concrete commitments

    systems_awareness:
      weight: 0.20
      category: decision_quality
      description: "Interconnections, second-order effects, avoiding silver-bullet thinking"
      scale: |
        0-2: Simplistic framing. "This will solve everything." No trade-offs mentioned.
        3-4: Minor acknowledgement of challenges, but overall triumphalist tone.
        5-6: Trade-offs explicitly discussed. Some uncertainty acknowledged.
        7-8: Multiple perspectives considered. Unintended consequences addressed. Nuanced framing.
        9-10: Deep systems awareness. Explicit uncertainty quantification. Adaptive management built in.
      critical_filters: |
        Score 0-2 if: "Revolutionary" or "game-changing" rhetoric without caveats,
        single solution presented as complete answer,
        no mention of trade-offs or unintended consequences

    course_correction:
      weight: 0.20
      category: decision_quality
      description: "Admitting previous path was wrong; changing direction based on evidence"
      scale: |
        0-2: No admission of past error. Defensive posture. Doubling down.
        3-4: Implicit acknowledgement of need for change, but no explicit admission.
        5-6: Explicit acknowledgement that previous approach had problems.
        7-8: Clear admission of error by leaders. Concrete policy reversal based on evidence.
        9-10: Institutional humility. Systems for ongoing course correction. Learning culture visible.
      critical_filters: |
        Score 0-2 if: No course correction element (just a new initiative),
        blame shifted to others rather than taking responsibility,
        change framed as "evolution" to avoid admitting error

    # === LEGACY DIMENSIONS ===

    intergenerational_investment:
      weight: 0.15
      category: legacy
      description: "Future generations considered; education, knowledge transfer, stewardship"
      scale: |
        0-2: No mention of future generations. Present-focused only.
        3-4: Vague reference to "our children" without concrete mechanisms.
        5-6: Explicit mention of future generations in decision rationale. Education or knowledge transfer as means.
        7-8: Structural mechanisms to protect future interests. Education redesigned for long-term capability.
        9-10: Future generations given standing. Intergenerational equity as core principle.
      critical_filters: |
        Score 0-2 if: Decision timeframe within current political or business cycle only,
        future generations mentioned rhetorically but not structurally protected,
        education mentioned only as job training or economic competitiveness

    institutional_durability:
      weight: 0.10
      category: legacy
      description: "Structures that outlast current leaders; governance for the long run"
      scale: |
        0-2: Decision depends on current leader. No institutional embedding. Easily reversed.
        3-4: Some organizational change, but fragile. Depends on continued political will.
        5-6: Governance mechanisms created. Multi-party support visible.
        7-8: Constitutional or legal embedding. Independent bodies created.
        9-10: Deep institutional design — self-reinforcing mechanisms, constitutional protection, international treaty.
      critical_filters: |
        Score 0-2 if: Decision depends entirely on current leadership,
        no governance structures mentioned,
        change could be reversed by next administration

    evidence_foundation:
      weight: 0.10
      category: decision_quality
      description: "Decision grounded in evidence, not ideology or popularity"
      gatekeeper: true
      gatekeeper_threshold: 3
      gatekeeper_max_score: 3.0
      scale: |
        0-2: Decision based on ideology, popularity, or intuition. No evidence cited.
        3-4: Some evidence mentioned, but cherry-picked or anecdotal.
        5-6: Solid evidence base. Studies or data cited. Expert input visible.
        7-8: Multiple evidence sources. Independent review. Counter-evidence addressed.
        9-10: Rigorous evidence synthesis. Transparent methodology. Peer review or equivalent.
      critical_filters: |
        Score 0-2 if: Decision driven by political pressure or popularity,
        no data, studies, or expert input cited,
        evidence mentioned but contradicted by the decision

  tiers:
    high:
      threshold: 7.0
      description: "Landmark foresight — generational decisions, paradigm shifts, institutional transformation"

    medium:
      threshold: 4.0
      description: "Clear foresight signals — some long-term thinking, partial institutional embedding"

    low:
      threshold: 0.0
      description: "No foresight signals, short-term thinking, or rhetoric without action"

  gatekeepers:
    evidence_foundation_gatekeeper:
      dimension: evidence_foundation
      threshold: 3
      max_score: 3.0
      reason: "Foresight without evidence is wishful thinking"

  # Soft content_type_caps — raised from v1-initial (2.0-3.0) to (4.0-5.0).
  # Embedding prefilter handles primary scope; caps catch false positives.
  content_type_caps:
    no_decision_context:
      max_score: 4.0
      triggers:
        - "Outcome/event reporting without decision context"
    rhetoric_partial:
      max_score: 5.0
      triggers:
        - "Long-term language but no concrete action or policy change"
    corporate_strategy:
      max_score: 5.0
      triggers:
        - "Business decision without clear public benefit"

preprocessing:
  head_tail:
    enabled: true
    head_tokens: 256
    tail_tokens: 256
    separator: " [...] "

training:
  target_samples: 7000
  train_val_test_split: [0.8, 0.1, 0.1]
  quality_threshold: 0.7
  recommended_model: "google/gemma-3-1b-pt"
  expected_mae: "<1.0 per dimension"
  notes: |
    Two-stage approach: embedding screening (ADR-011) selects foresight candidates,
    oracle scores only screened articles. No content-type caps — prefilter handles scope.
    Merge screened + random background articles (ADR-003) for balanced training data.

hybrid_inference:
  stage1:
    embedding_model: "intfloat/multilingual-e5-small"
    probe_path: "probe/embedding_probe_e5small.pkl"
    threshold: null  # To be calibrated after training
  stage2:
    model: "current"

deployment:
  inference_time: "~20ms"
  inference_time_hybrid: "~12ms avg"
  cost_per_article: "$0.00"
  use_cases:
    - "Curating stories of long-term decision-making"
    - "Countering short-termism with institutional foresight examples"
    - "Tracking education reform and intergenerational investment"
    - "ovr.news Foresight tab"
